{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Optimess - Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="{% static 'css/admin_theme.css' %}">

</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <!-- BRAND -->
        <div class="brand">
            <div class="logo-box">
                <i class="fa-solid fa-utensils"></i>
            </div>
            <div class="logo-text">Optimess</div>
        </div>

        <!-- PROFILE -->
        <div class="profile">
            <div class="avatar">
                {{ request.user.username|first|upper }}
            </div>
            <div class="profile-info">
                <div class="name">
                    {{ request.user.username }}
                </div>
                <div class="role">
                    ADMIN
                </div>
            </div>
        </div>

        <!-- MENU -->
        <div class="menu">

            <a href="{% url 'admin_dashboard' %}">
                <i class="fa-solid fa-gauge"></i>
                <span>Dashboard</span>
            </a>

            <a href="{% url 'manage_students' %}">
                <i class="fa-solid fa-user-graduate"></i>
                <span>Students</span>
            </a>

            <a href="{% url 'manage_wardens' %}">
                <i class="fa-solid fa-user-tie"></i>
                <span>Wardens</span>
            </a>

            <a href="{% url 'manage_mess' %}">
                <i class="fa-solid fa-utensils"></i>
                <span>Mess Managers</span>
            </a>

            <a href="{% url 'all_leaves' %}">
                <i class="fa-solid fa-plane-departure"></i>
                <span>All Leaves</span>
            </a>

            <a href="{% url 'broadcasts' %}">
                <i class="fa-solid fa-bullhorn"></i>
                <span>Broadcasts</span>
            </a>

            <a href="{% url 'attendance_report' %}">
                <i class="fa-solid fa-calendar-check"></i>
                <span>Attendance</span>
            </a>

            <a href="{% url 'food_report' %}">
                <i class="fa-solid fa-chart-column"></i>
                <span>Food Report</span>
            </a>

            <a href="{% url 'meal_analysis' %}">
                <i class="fa-solid fa-chart-pie"></i>
                <span>Meal Analysis</span>
            </a>

            

        </div>

        <!-- FOOTER -->
        <div class="sidebar-footer">
            <form action="{% url 'logout' %}" method="POST">
                {% csrf_token %}
                <button type="submit" class="logout-btn">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </button>
            </form>
        </div>

    </div>


    <!-- MAIN CONTENT -->
    <div class="main">

        <div class="topbar">
            <div></div>
            <div class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</div>
        </div>

        {% block content %}
        {% endblock %}

    </div>

</div>


<script>

function toggleTheme(){
    document.body.classList.toggle("light");
    const btn=document.querySelector('.theme-toggle');

    if(document.body.classList.contains("light")){
        btn.innerText="☀ Light Mode";
        localStorage.setItem("theme","light");
    }else{
        btn.innerText="🌙 Dark Mode";
        localStorage.setItem("theme","dark");
    }
}

window.onload=function(){
    const savedTheme=localStorage.getItem("theme");
    const btn=document.querySelector('.theme-toggle');

    if(savedTheme==="light"){
        document.body.classList.add("light");
        btn.innerText="☀ Light Mode";
    }else{
        btn.innerText="🌙 Dark Mode";
    }
};

</script>

</body>
</html>
