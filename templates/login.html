<!DOCTYPE html>
<html>
<head>
    <title>Optimess Login</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #e5e9f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main-container {
            text-align: center;
        }

        /* Logo Box */
        .logo-box {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            border-radius: 20px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
    
        h1 {
            margin: 10px 0 5px 0;
        }

        .subtext {
            color: #555;
            margin-bottom: 30px;
        }

        /* Role Buttons */
        .role-section {
            width: 420px;
            margin: auto;
            margin-bottom: 30px;
        }

        .role-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .role-btn {
            width: 48%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid #cbd5e1;
            background: white;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 500;
        }

        .role-btn:hover {
            transform: translateY(-3px);
        }

        .active {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Login Card */
        .login-card {
            background: white;
            padding: 35px;
            border-radius: 18px;
            width: 420px;
            margin: auto;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border: 1px solid #2a5298;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .error {
            color: red;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="main-container">

    <div class="logo-box">
        🏢
    </div>

    <h1>Optimess</h1>
    <div class="subtext">
        Hostel Management System <br>
        Select your portal and login
    </div>

    <!-- Role Buttons -->
    <div class="role-section">
        <div class="role-row">
            <button type="button" class="role-btn active" onclick="selectRole(this, 'student')">Student</button>
            <button type="button" class="role-btn" onclick="selectRole(this, 'warden')">Warden</button>
        </div>
        <div class="role-row">
            <button type="button" class="role-btn" onclick="selectRole(this, 'mess')">Mess Manager</button>
            <button type="button" class="role-btn" onclick="selectRole(this, 'admin')">Admin</button>
        </div>
    </div>

    <!-- Login Box -->
    <div class="login-card">

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="role" id="role" value="student">

            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit" class="login-btn" id="loginText">
                Login as Student
            </button>
        </form>

    </div>

</div>

<script>
    function selectRole(button, role) {
        let buttons = document.querySelectorAll('.role-btn');
        buttons.forEach(btn => btn.classList.remove('active'));

        button.classList.add('active');

        document.getElementById('role').value = role;

        document.getElementById('loginText').innerText =
            "Login as " + button.innerText;
    }
</script>

</body>
</html>
