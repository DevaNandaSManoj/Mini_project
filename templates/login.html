<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimess – Smart Hostel Management</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= ROOT VARIABLES ================= */
:root{
  --bg:#070e1c;
  --surface:#0f172a;
  --surface2:#162133;
  --border:rgba(99,179,237,0.15);
  --accent:#38bdf8;
  --accent2:#818cf8;
  --text:#e2e8f0;
  --text2:#94a3b8;
}

/* ================= LIGHT MODE ================= */
body.light{
  --bg:#eef2f7;
  --surface:#ffffff;
  --surface2:#f3f6fb;
  --border:rgba(0,0,0,0.08);
  --text:#1e293b;
  --text2:#64748b;
}

/* ================= BASE ================= */
body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s ease;
  position:relative;
}

/* ================= GRID BACKGROUND ================= */
@keyframes backgroundPan {
  from { background-position: 0 0; }
  to { background-position: 40px 40px; }
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background-size:40px 40px;
  pointer-events:none;
  z-index:0;
  animation: backgroundPan 1.5s linear infinite;
  opacity: 0.6;
}

/* Dark grid */
body:not(.light)::before{
  background-image:
    linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
}

/* Light grid */
body.light::before{
  background-image:
    linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
}

/* ================= ANIMATIONS ================= */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-up {
  opacity: 0;
  animation: fadeInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}

.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }
.delay-4 { animation-delay: 0.4s; }
.delay-5 { animation-delay: 0.5s; }

/* ================= HEADER ================= */
.header{
  text-align:center;
  padding-top:60px;
  position:relative;
  z-index:1;
}

.logo-box{
  width:80px;
  height:80px;
  margin:auto;
  border-radius:20px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  color:white;
  box-shadow:0 0 35px rgba(56,189,248,0.6);
  margin-bottom:20px;
}

/* ===== Optimess Gradient Logo ===== */
.optimess-logo{
  font-family:'Syne', sans-serif;
  font-weight:900;
  font-size:42px;
  letter-spacing:-0.05em;

  background: linear-gradient(
    90deg,
    #b9ebf2 0%,
    #4dc3fa 30%,
    #1e94f4 65%,
    #9571d3 100%
  );

  background-size: 100% 100%;
  background-repeat: no-repeat;

  -webkit-background-clip: text;
  background-clip: text;

  -webkit-text-fill-color: transparent;
  color: transparent;

  display:inline-block;          /* IMPORTANT */
  transform: translateZ(0);      /* GPU force */
  will-change: transform;        /* Stabilize */
}

.header p{
  color:var(--text2);
  margin-top:8px;
  font-size:14px;
}

/* ================= CARD ================= */
.container{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height: 100vh;
  position:relative;
  z-index:1;
  padding: 40px 20px;
  box-sizing: border-box;
}

.card{
  width:900px;
  min-height: 550px;
  background:var(--surface);
  border-radius:16px;
  border:1px solid var(--border);
  backdrop-filter:blur(16px);
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  position: relative;
  display: flex;
  overflow: hidden;
  padding: 0;
}

.card-left {
  flex: 1.1;
  background: url('/static/images/login_bg.png') no-repeat center center;
  background-size: cover;
  position: relative;
}

.card-right {
  flex: 1;
  padding: 48px 40px;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* Subtle ambient glow behind the card */
.card::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(129, 140, 248, 0.15));
  z-index: -1;
  filter: blur(12px);
  pointer-events: none;
}

.card-right h2{
  font-family:'Syne',sans-serif;
  font-size:32px;
  font-weight:800;
  color: var(--accent);
  margin-bottom:8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.card-right h2::after {
  content: "";
  display: block;
  width: 40px;
  height: 4px;
  background: var(--accent);
  margin-top: 8px;
  border-radius: 2px;
}

.card-right .sub{
  color:var(--text2);
  font-size:14px;
  margin-bottom:32px;
  line-height: 1.6;
}

/* ================= ROLE SECTION ================= */
.role-label{
  font-size:11px;
  font-weight:700;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--text2);
  margin-bottom:12px;
}

.role-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:32px;
}

.role-btn{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 10px;
  text-align:center;
  cursor:pointer;
  transition:all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
}

.role-btn i{
  font-size:18px;
  display:block;
  margin-bottom:6px;
}

.role-btn:hover{
  transform:translateY(-2px);
  background: rgba(255, 255, 255, 0.03);
  color: var(--text);
}

body.light .role-btn:hover {
  background: rgba(0, 0, 0, 0.02);
}

.role-btn.active{
  border-color:var(--accent);
  color: var(--text);
  background: linear-gradient(135deg, rgba(56,189,248,0.1), rgba(129,140,248,0.05));
  box-shadow:0 0 0 1px var(--accent) inset, 0 4px 12px rgba(56,189,248,0.15);
}

/* ================= INPUTS ================= */
.input-group {
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  background: rgba(148, 163, 184, 0.1);
  border-radius: 8px;
  padding: 0 16px;
  border: 1px solid transparent;
  transition: all 0.3s;
}

body.light .input-group {
  background: rgba(0, 0, 0, 0.04);
}

.input-group:focus-within {
  border-color: var(--accent);
  background: transparent;
}

.input-group i {
  color: var(--text2);
  font-size: 16px;
  margin-right: 12px;
}

.input-group label {
  display: none;
}

.input-group input {
  flex: 1;
  padding: 14px 0;
  border: none;
  background: transparent !important;
  color: var(--text);
  font-size: 14px;
  box-shadow: none !important;
  outline: none;
  box-sizing: border-box;
}

.input-group input::placeholder {
  color: var(--text2);
}

body.light .input-group input {
  background: transparent !important;
  border: none;
  box-shadow: none !important;
}

.input-group input:focus{
  outline:none;
  border:none;
  background:transparent;
  box-shadow:none !important;
}

.input-group input:-webkit-autofill,
.input-group input:-webkit-autofill:hover, 
.input-group input:-webkit-autofill:focus, 
.input-group input:-webkit-autofill:active{
    -webkit-box-shadow: 0 0 0 30px transparent inset !important;
    transition: background-color 5000s ease-in-out 0s;
    -webkit-text-fill-color: var(--text) !important;
}

/* ================= EXTRA OPTIONS ================= */
.extra-options {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  font-size: 13px;
  color: var(--text2);
}

.extra-options .remember {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.extra-options .remember input[type="checkbox"] {
  accent-color: var(--accent);
  width: 14px;
  height: 14px;
  cursor: pointer;
}

.extra-options .forgot {
  color: var(--text2);
  text-decoration: none;
  font-style: italic;
  transition: color 0.3s;
}

.extra-options .forgot:hover {
  color: var(--accent);
}

/* ================= BUTTON ================= */
.login-btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg, #0052d4, #4364f7, #6fb1fc);
  color:white;
  font-weight:700;
  font-size: 14px;
  letter-spacing: 1px;
  margin-top: 10px;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  box-shadow:0 4px 15px rgba(67, 100, 247, 0.3);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
}

.login-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 25px rgba(67, 100, 247, 0.5);
}

/* ================= THEME TOGGLE ================= */
.theme-toggle{
  position:fixed;
  top:24px;
  right:24px;
  padding:10px 18px;
  border-radius:30px;
  background:var(--surface2);
  border:1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  cursor:pointer;
  z-index:2;
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.theme-toggle:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 12px -2px rgba(0, 0, 0, 0.15);
}

.error{
  color:#f87171;
  margin-bottom:10px;
  text-align:center;
}

</style>
</head>

<body>

<div class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</div>

<div class="container animate-up delay-1">
<div class="card">
  
  <div class="card-left">
    <!-- Image is set via CSS background -->
  </div>

  <div class="card-right">
    <div class="animate-up delay-2">
      <h2 style="text-transform: none; font-weight: bold;">Optimess</h2>
      <div style="font-size: 14px; color: var(--text2); margin-top: -5px; margin-bottom: 20px;">hostel mess management system</div>

      <div class="role-label">I Am A</div>

      {% if error %}
      <div class="error" style="font-size: 13px;">{{ error }}</div>
      {% endif %}

      <div class="role-grid">
        <div class="role-btn active" onclick="selectRole(this,'student')">
          <i class="fa-solid fa-graduation-cap"></i>
          Student
        </div>
        <div class="role-btn" onclick="selectRole(this,'warden')">
          <i class="fa-solid fa-building-columns"></i>
          Warden
        </div>
        <div class="role-btn" onclick="selectRole(this,'mess')">
          <i class="fa-solid fa-bowl-food"></i>
          Mess
        </div>
        <div class="role-btn" onclick="selectRole(this,'admin')">
          <i class="fa-solid fa-gear"></i>
          Admin
        </div>
      </div>
    </div>

    <form method="post" class="animate-up delay-3">
      {% csrf_token %}
      <input type="hidden" name="role" id="role" value="student">

      <div class="input-group">
        <i class="fa-solid fa-user"></i>
        <input type="text" name="username" placeholder="User ID" required>
      </div>

      <div class="input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" name="password" placeholder="Password" required>
      </div>

      <div class="extra-options">
        <label class="remember">
          <input type="checkbox" name="remember" checked>
          Remember
        </label>
        <a href="#" class="forgot">Forgot your password?</a>
      </div>

      <button class="login-btn animate-up delay-4" id="loginText">
        LOGIN AS STUDENT <i class="fa-solid fa-arrow-right"></i>
      </button>
    </form>
  </div>

</div>
</div>

<script>
function selectRole(el,role){
  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('role').value=role;
  document.getElementById('loginText').innerHTML="LOGIN AS " + el.innerText.trim().toUpperCase() + " <i class='fa-solid fa-arrow-right'></i>";
}

function toggleTheme(){
  document.body.classList.toggle("light");
  const btn=document.querySelector('.theme-toggle');
  if(document.body.classList.contains("light")){
    btn.innerText="☀ Light Mode";
  }else{
    btn.innerText="🌙 Dark Mode";
  }
}
</script>

</body>
</html>
