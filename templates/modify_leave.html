<h2>Modify Leave</h2>

<p><strong>Current Leave:</strong></p>
<p>From: {{ leave.from_date }}</p>
<p>To: {{ leave.to_date }}</p>
<p>Status: {{ leave.status }}</p>

<hr>

{% if error %}
    <p style="color:red">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}

    <label>New End Date:</label><br>
    <input type="date" name="new_end_date" required><br><br>

    <button type="submit">Update Leave</button>
</form>
