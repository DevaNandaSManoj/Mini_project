<h2>Send Broadcast Message</h2>

<hr>

<form method="post">
    {% csrf_token %}

    <label>Enter message to send to all students:</label><br><br>
    <textarea name="message" rows="5" cols="50" required></textarea><br><br>

    <button type="submit">Send</button>
</form>

<br>
<a href="{% url 'warden_dashboard' %}">
    <button type="button">Back to Dashboard</button>
</a>
